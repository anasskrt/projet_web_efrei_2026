<app-card>
  <div class="messages-card">
    <div class="messages-card__header">
      <lucide-angular [img]="MessageCircleIcon" [size]="20" class="messages-card__icon" aria-hidden="true" />
      <h3 class="messages-card__title">Messages non lus</h3>
    </div>

    @if (isLoading()) {
      <div class="messages-card__loader" role="status" aria-label="Chargement des messages">
        <span class="messages-card__skeleton"></span>
        <span class="messages-card__skeleton"></span>
      </div>
    } @else if (hasMessages()) {
      <ul class="messages-card__list" role="list">
        @for (msg of messages(); track msg.conversationId) {
          <li class="messages-card__item">
            <app-avatar [initials]="getInitial(msg.senderName)" [size]="40" [alt]="msg.senderName" />
            <div class="messages-card__info">
              <span class="messages-card__sender">{{ msg.senderName }}</span>
              @if (msg.excerpt) {
                <span class="messages-card__excerpt">{{ msg.excerpt }}</span>
              }
            </div>
            @if (msg.unreadCount > 0) {
              <span class="messages-card__badge" [attr.aria-label]="msg.unreadCount + ' messages non lus'">
                {{ msg.unreadCount }}
              </span>
            }
          </li>
        }
      </ul>
    } @else {
      <p class="messages-card__empty">Aucun message non lu</p>
    }
  </div>
</app-card>
